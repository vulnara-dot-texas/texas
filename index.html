<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODURA — Configurable Suit System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111110; --surface: #1c1c1a; --border: #2e2e2b;
  --gold: #c9a84c; --gold-dim: #7a6530; --white: #f0ede6; --muted: #6b6b65;
  --radius: 6px;
}
body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; background: var(--bg);
}
.brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: 0.22em; }
.brand span { color: var(--gold); }
.tagline { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

/* ── PAGE LAYOUT: SVG centred, panels below/beside ── */
.page { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 40px; gap: 0; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── SVG CANVAS ── */
.canvas-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 0 8px; }
.canvas-label { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
svg.suit { width: min(260px, 80vw); height: auto; }
.part-transition { transition: opacity 0.22s ease; }

/* ── ACCORDION CONTAINER ── */
.accordion-wrap { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

/* ── ACCORDION SECTION ── */
.acc-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.acc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.acc-header:hover { background: #242420; }
.acc-header.open { border-bottom: 1px solid var(--border); }

.acc-title { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; display: flex; align-items: center; gap: 10px; }
.acc-title .section-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.acc-meta { font-size: 0.62rem; color: var(--muted); margin-left: auto; margin-right: 12px; }
.acc-chevron { font-size: 0.55rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.acc-header.open .acc-chevron { transform: rotate(180deg); }

.acc-body { display: none; padding: 14px 16px; }
.acc-body.open { display: block; }

/* ── SECTION: summary bar ── */
.summary-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.count-big { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); line-height: 1; }
.count-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.active-list { list-style: none; margin-top: 12px; }
.active-list li { font-size: 0.7rem; padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.li-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.li-mat { color: var(--muted); font-size: 0.6rem; margin-left: auto; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.reset-btn { flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
.reset-btn:hover { border-color: var(--muted); color: var(--white); }
.all-btn { flex: 1; padding: 10px; background: var(--gold); border: none; color: #111; font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
.all-btn:hover { background: #dbb85a; }

/* ── MODULE BUTTONS ── */
.module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
@media (max-width: 480px) { .module-grid { grid-template-columns: 1fr; } }

.module-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--white);
  padding: 10px 12px; border-radius: 4px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Inter', sans-serif; font-size: 0.72rem; text-align: left;
  transition: all 0.15s; user-select: none;
}
.module-btn:hover { border-color: var(--gold-dim); background: #1a1a18; }
.module-btn.active { border-color: var(--gold); background: #1a1710; color: var(--gold); }
.module-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: all 0.15s; }
.module-btn.active .dot { background: var(--gold); box-shadow: 0 0 5px var(--gold); }
.btn-sub { font-size: 0.6rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }
.module-btn.active .btn-sub { color: #7a6530; }
.group-label { font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin: 10px 0 6px; grid-column: 1 / -1; }

/* ── STYLE CARDS ── */
.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
@media (max-width: 500px) { .style-grid { grid-template-columns: 1fr; } }

.style-card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.style-card-hd {
  padding: 9px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; user-select: none; transition: background 0.15s;
}
.style-card-hd:hover { background: #1a1a18; }
.style-card-hd .hd-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; transition: background 0.2s; }
.style-card-hd .hd-label { flex: 1; }
.style-card-hd .hd-chevron { font-size: 0.5rem; color: var(--muted); transition: transform 0.2s; }
.style-card.open .hd-chevron { transform: rotate(180deg); }
.style-card-bd { display: none; padding: 10px 12px; border-top: 1px solid var(--border); }
.style-card.open .style-card-bd { display: block; }

.micro-label { font-size: 0.57rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.swatch-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.swatch { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; flex-shrink: 0; }
.swatch:hover { transform: scale(1.15); }
.swatch.selected { border-color: var(--white); box-shadow: 0 0 0 1px var(--gold); }
.mat-row { display: flex; gap: 4px; flex-wrap: wrap; }
.mat-pill { padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); font-size: 0.59rem; cursor: pointer; background: none; color: var(--muted); font-family: 'Inter', sans-serif; transition: all 0.12s; }
.mat-pill:hover { border-color: var(--gold-dim); color: var(--white); }
.mat-pill.selected { border-color: var(--gold); color: var(--gold); background: #1a1710; }

/* material filters */
.mat-wool    { filter: none; }
.mat-linen   { filter: brightness(1.08) saturate(0.85); }
.mat-leather { filter: brightness(0.88) saturate(1.2) contrast(1.1); }
.mat-nylon   { filter: brightness(1.05) saturate(1.3); }
.mat-velvet  { filter: brightness(0.82) saturate(1.4) contrast(1.15); }
.mat-denim   { filter: brightness(0.9) saturate(0.7) hue-rotate(5deg); }

footer { padding: 10px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
.footer-note { font-size: 0.58rem; color: var(--muted); }
.active-badge { font-size: 0.58rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>

  { name: 'Olive',      hex: '#6b6e45' }, { name: 'Burgundy',   hex: '#6b2737' },
  { name: 'Rust',       hex: '#8b4513' }, { name: 'Camel',      hex: '#c19a6b' },
  { name: 'Cream',      hex: '#f5f0e8' }, { name: 'Black',      hex: '#1a1a1a' },
  { name: 'Gold',       hex: '#c9a84c' }, { name: 'Silver',     hex: '#a8a8a8' },
  { name: 'Cobalt',     hex: '#2a4f9e' }, { name: 'Terracotta', hex: '#c1623f' },
];

const MATERIALS = ['Wool', 'Linen', 'Leather', 'Nylon', 'Velvet', 'Denim'];

const toggleState = {};
MODULES.forEach(m => toggleState[m.id] = true);

const styleState = {};
STYLE_PARTS.forEach(p => { styleState[p.id] = { color: p.defaultColor, material: 'Wool' }; });

// ── ACCORDION ─────────────────────────────────────────────────────────────────
function toggleAcc(header) {
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  header.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

// ── MODULE TOGGLE ─────────────────────────────────────────────────────────────
function toggleModule(btn) {
  const id = btn.dataset.id;
  toggleState[id] = !toggleState[id];
  btn.classList.toggle('active', toggleState[id]);
  const el = document.getElementById('svg-' + id);
  if (el) el.style.opacity = toggleState[id] ? '1' : '0';
  updateSummary();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  MODULES.forEach(m => {
    toggleState[m.id] = false;
    const el = document.getElementById('svg-' + m.id);
    if (el) el.style.opacity = '0';
  });
  document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
  updateSummary();
});

document.getElementById('allBtn').addEventListener('click', () => {
  MODULES.forEach(m => {
    toggleState[m.id] = true;
    const el = document.getElementById('svg-' + m.id);
    if (el) el.style.opacity = '1';
  });
  document.querySelectorAll('.module-btn').forEach(b => b.classList.add('active'));
  updateSummary();
});

// ── STYLE ─────────────────────────────────────────────────────────────────────
function applyStyle(partId) {
  const part = STYLE_PARTS.find(p => p.id === partId);
  if (!part) return;
  const { color, material } = styleState[partId];
  document.querySelectorAll(part.selector).forEach(el => {
    el.setAttribute('fill', color);
    el.classList.remove('mat-wool','mat-linen','mat-leather','mat-nylon','mat-velvet','mat-denim');
    el.classList.add('mat-' + material.toLowerCase());
  });
  updateSummary();
}

function buildStyleCards() {
  const container = document.getElementById('style-cards');
  STYLE_PARTS.forEach(part => {
    const card = document.createElement('div');
    card.className = 'style-card';
    card.innerHTML = `
      <div class="style-card-hd">
        <span class="hd-dot" style="background:${part.defaultColor}"></span>
        <span class="hd-label">${part.label}</span>
        <span class="hd-chevron">▼</span>
      </div>
      <div class="style-card-bd">
        <div class="micro-label">Colour</div>
        <div class="swatch-row" id="sw-${part.id}"></div>
        <div class="micro-label" style="margin-top:6px">Material</div>
        <div class="mat-row" id="mt-${part.id}"></div>
      </div>`;
    container.appendChild(card);

    card.querySelector('.style-card-hd').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    const swRow = card.querySelector('#sw-' + part.id);
    const dot = card.querySelector('.hd-dot');
    PALETTE.forEach(p => {
      const s = document.createElement('div');
      s.className = 'swatch' + (p.hex === part.defaultColor ? ' selected' : '');
      s.style.background = p.hex;
      s.title = p.name;
      s.addEventListener('click', () => {
        swRow.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
        s.classList.add('selected');
        styleState[part.id].color = p.hex;
        dot.style.background = p.hex;
        applyStyle(part.id);
      });
      swRow.appendChild(s);
    });

    const mtRow = card.querySelector('#mt-' + part.id);
    MATERIALS.forEach(mat => {
      const pill = document.createElement('button');
      pill.className = 'mat-pill' + (mat === 'Wool' ? ' selected' : '');
      pill.textContent = mat;
      pill.addEventListener('click', () => {
        mtRow.querySelectorAll('.mat-pill').forEach(x => x.classList.remove('selected'));
        pill.classList.add('selected');
        styleState[part.id].material = mat;
        applyStyle(part.id);
      });
      mtRow.appendChild(pill);
    });
  });
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function updateSummary() {
  const active = MODULES.filter(m => toggleState[m.id]);
  const n = active.length;
  const total = MODULES.length;
  document.getElementById('countDisplay').textContent = n;
  document.getElementById('footerBadge').textContent = `${n} / ${total} active`;
  document.getElementById('mod-meta').textContent = `${n} / ${total} on`;
  document.getElementById('sum-meta').textContent = `${n} active`;

  const list = document.getElementById('activeList');
  list.innerHTML = '';
  active.forEach(m => {
    const sp = STYLE_PARTS.find(p => p.id === m.id);
    const color = sp ? styleState[sp.id].color : '#c9a84c';
    const mat = sp ? styleState[sp.id].material : '';
    const li = document.createElement('li');
    li.innerHTML = `<span class="li-swatch" style="background:${color}"></span>${m.label}<span class="li-mat">${mat}</span>`;
    list.appendChild(li);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildStyleCards();
updateSummary();
</script>
</body>
</html>
